<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Smart Booking | Portale Dipendenti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .toast-enter { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translate(-50%, -100%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, 0) scale(1); }
        }
        .modal-backdrop { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
        .scale-up { animation: scaleUp 0.2s ease-out forwards; }
        @keyframes scaleUp {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen flex flex-col selection:bg-indigo-200 selection:text-indigo-900">
    <div id="app" class="w-full min-h-screen flex flex-col transition-all duration-300"></div>
    <div id="notification-container" class="fixed top-6 left-1/2 transform -translate-x-1/2 z-[100] pointer-events-none flex flex-col gap-2 w-[90%] max-w-md"></div>

<script>
    // ==========================================
    // CONFIGURAZIONE DATABASE GOOGLE
    // ==========================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEiZioys0Xb5ZZhR0FinxPPfqYSxo61KUYbdKz8J_FPUOypOOLHwxIfQ6QDiYYa8xUNg/exec"; 
    
    // --- VARIABILI DI STATO ---
    let USERS = [];
    let FLOORS = {};
    const MAX_DAYS_PER_MONTH = 6;
    const MAX_FRIDAYS_PER_MONTH = 2;
    const today = new Date();
    
    const state = {
        loginStep: 1,
        loginUser: null,
        currentUser: null,
        isBoardView: false, 
        showDayDetails: null,
        currentMonthDate: new Date(today.getFullYear(), today.getMonth(), 1),
        selectedDate: today,
        bookings: [],
        isLoading: false
    };

    // ==========================================
    // UTILITY: MOTORE DATE E FESTIVITÀ
    // ==========================================
    
    function toYYYYMMDD(dateObj) {
        if (!dateObj) return null;
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function parseAnyDateToYYYYMMDD(dateInput) {
        if (!dateInput) return null;
        let d = String(dateInput).trim();
        if (d.includes('T')) d = d.split('T')[0]; 
        
        let match = d.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
        if (match) {
            let day = match[1].padStart(2, '0');
            let month = match[2].padStart(2, '0');
            let year = match[3];
            if (year.length === 2) year = "20" + year; 
            return `${year}-${month}-${day}`;
        }
        
        match = d.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
        if (match) {
            let year = match[1];
            let month = match[2].padStart(2, '0');
            let day = match[3].padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        let parsed = new Date(d);
        if (!isNaN(parsed.getTime())) return toYYYYMMDD(parsed);
        return null;
    }

    function formatDisplayDate(dateStr) {
        if (!dateStr) return "";
        const parts = dateStr.split('-');
        const dateObj = new Date(parts[0], parts[1] - 1, parts[2], 12, 0, 0);
        return dateObj.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    function getEaster(year) {
        let f = Math.floor, G = year % 19, C = f(year / 100),
            H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30,
            I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11)),
            J = (year + f(year / 4) + I + 2 - C + f(C / 4)) % 7,
            L = I - J, month = 3 + f((L + 40) / 44), day = L + 28 - 31 * f(month / 4);
        return new Date(year, month - 1, day);
    }

    function getClosureReason(dateObj) {
        const day = dateObj.getDate();
        const month = dateObj.getMonth();
        const year = dateObj.getFullYear();
        const dayOfWeek = dateObj.getDay();

        if ((month === 11 && day >= 24) || (month === 0 && day <= 6)) {
            if (month === 11 && day === 25) return "Natale";
            if (month === 11 && day === 26) return "Santo Stefano";
            if (month === 0 && day === 1) return "Capodanno";
            if (month === 0 && day === 6) return "Epifania";
            return "Chiusura Natalizia Studio";
        }

        if (month === 3 && day === 25) return "Festa della Liberazione";
        if (month === 4 && day === 1) return "Festa dei Lavoratori";
        if (month === 5 && day === 2) return "Festa della Repubblica";
        if (month === 7 && day === 15) return "Ferragosto";
        if (month === 10 && day === 1) return "Tutti i Santi";
        if (month === 11 && day === 8) return "Immacolata Concezione";

        const easter = getEaster(year);
        const pasquetta = new Date(easter);
        pasquetta.setDate(pasquetta.getDate() + 1);
        if (month === pasquetta.getMonth() && day === pasquetta.getDate()) {
            return "Lunedì di Pasquetta";
        }

        if ((month === 6 || month === 7) && dayOfWeek === 5) {
            return "Chiusura Venerdì Estivo";
        }
        if (month === 7 && day >= 10 && day <= 24) {
            return "Chiusura Estiva Studio";
        }

        return null;
    }

    // ==========================================
    // COMUNICAZIONE COL DATABASE
    // ==========================================

    async function loadDataFromGoogleSheets() {
        try {
            state.isLoading = true;
            render();

            // Cache buster basico per evitare che il browser ricordi vecchi file
            const cacheBuster = new Date().getTime();
            const fetchUrl = `${SCRIPT_URL}?action=getData&t=${cacheBuster}`;

            const response = await fetch(fetchUrl, {
                method: "GET",
                redirect: "follow"
            });
            
            if (!response.ok) throw new Error("Errore HTTP");
            
            const data = await response.json();
            USERS = data.users || [];
            
            // --- SCUDO ANTI-DUPLICATI E PULIZIA SPAZI INVISIBILI ---
            const uniqueBookings = [];
            const seen = new Set();
            
            (data.bookings || []).forEach(b => {
                const rawDate = b.date || b.data || b.Data || b.Data_prenotazione; 
                const parsedDate = parseAnyDateToYYYYMMDD(rawDate);
                
                if (parsedDate && b.userId) {
                    const uid = String(b.userId).trim(); // Rimuove spazi accidentali da Excel
                    const key = `${uid}_${parsedDate}`;
                    
                    // Se non abbiamo mai visto questa combo Utente+Data, la salviamo
                    if (!seen.has(key)) {
                        seen.add(key);
                        uniqueBookings.push({ 
                            ...b, 
                            userId: uid,
                            floor: String(b.floor || "").trim(),
                            date: parsedDate 
                        });
                    }
                }
            });
            
            state.bookings = uniqueBookings;
            calculateDynamicFloors();
            
            state.isLoading = false;
            render(); 
        } catch (error) {
            console.error("Errore Fetch:", error);
            showNotification("Errore di connessione. Riprova ricaricando la pagina.", "error");
            state.isLoading = false;
            render();
        }
    }

    function calculateDynamicFloors() {
        FLOORS = {};
        USERS.forEach(user => {
            const userFloor = String(user.floor || "").trim();
            if (!FLOORS[userFloor]) { FLOORS[userFloor] = { total: 0, maxSw: 0 }; }
            FLOORS[userFloor].total += 1;
        });
        Object.keys(FLOORS).forEach(floorName => {
            let limit = Math.round(FLOORS[floorName].total * 0.30);
            if (limit < 1 && FLOORS[floorName].total > 0) limit = 1; 
            FLOORS[floorName].maxSw = limit;
        });
    }

    async function syncBookingWithGoogle(bookingData, actionType) {
        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: actionType, booking: bookingData }),
                redirect: "follow" 
            });
            return true;
        } catch (e) {
            showNotification("Ritardo di connessione, ricarica la pagina per sicurezza.", "error");
            return false;
        }
    }

    // ==========================================
    // LOGICA DI BUSINESS & AZIONI
    // ==========================================

    function showNotification(message, type = 'error') {
        const container = document.getElementById('notification-container');
        const bgColor = type === 'error' ? 'bg-red-600' : 'bg-emerald-600';
        const icon = type === 'error' ? 'alert-circle' : 'check-circle-2';
        
        const toast = document.createElement('div');
        toast.className = `toast-enter ${bgColor} text-white px-5 py-4 rounded-2xl shadow-xl flex items-center gap-4 w-full`;
        toast.innerHTML = `<i data-lucide="${icon}" class="w-6 h-6 flex-shrink-0"></i><p class="font-bold text-sm tracking-wide">${message}</p>`;
        
        container.appendChild(toast);
        lucide.createIcons({ root: toast });
        
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translate(-50%, -20px)';
            toast.style.transition = 'all 0.3s ease';
            setTimeout(() => toast.remove(), 300);
        }, 3500);
    }

    function getCapacityColorLevels(percentage) {
        if (percentage >= 100) return { bar: 'bg-red-500', badgeBg: 'bg-red-50', badgeText: 'text-red-700', badgeBorder: 'border-red-200' };
        if (percentage >= 50) return { bar: 'bg-orange-500', badgeBg: 'bg-orange-50', badgeText: 'text-orange-700', badgeBorder: 'border-orange-200' };
        if (percentage > 0) return { bar: 'bg-amber-400', badgeBg: 'bg-amber-50', badgeText: 'text-amber-700', badgeBorder: 'border-amber-200' };
        return { bar: 'bg-emerald-500', badgeBg: 'bg-emerald-50', badgeText: 'text-emerald-700', badgeBorder: 'border-emerald-200' };
    }

    function initApp() { loadDataFromGoogleSheets(); }

    function selectLoginUser(userId) { state.loginUser = USERS.find(u => u.id == userId); state.loginStep = 2; render(); }
    function cancelLogin() { state.loginUser = null; state.loginStep = 1; render(); }
    function submitLogin() {
        const pwdInput = document.getElementById('password-input').value;
        if (String(pwdInput) === String(state.loginUser.password)) {
            state.currentUser = state.loginUser; state.loginStep = 1; render();
        } else { showNotification("Password errata. Riprova.", "error"); }
    }
    function logout() { state.currentUser = null; state.isBoardView = false; state.showDayDetails = null; render(); }
    
    function enterBoardView() { state.isBoardView = true; render(); }
    function exitBoardView() { state.isBoardView = false; state.showDayDetails = null; render(); }
    function openDayDetails(dateStr) { state.showDayDetails = dateStr; render(); }
    function closeDayDetails() { state.showDayDetails = null; render(); }
    
    function changeMonth(offset) { 
        state.currentMonthDate = new Date(state.currentMonthDate.getFullYear(), state.currentMonthDate.getMonth() + offset, 1); 
        render(); 
    }
    function selectDate(dateStr) { 
        const parts = dateStr.split('-'); 
        state.selectedDate = new Date(parts[0], parts[1] - 1, parts[2], 12, 0, 0); 
        render(); 
    }

    async function toggleBooking() {
        const selectedDateStr = toYYYYMMDD(state.selectedDate);
        const dayOfWeek = state.selectedDate.getDay();
        const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
        const chiusuraMotivo = getClosureReason(state.selectedDate);
        
        if (chiusuraMotivo) { showNotification(`Studio chiuso: ${chiusuraMotivo}`, "error"); return; }
        if (isWeekend) { showNotification("Non puoi prenotare durante il weekend.", "error"); return; }
        
        const currentUserId = String(state.currentUser.id).trim();
        const currentUserFloor = String(state.currentUser.floor).trim();
        
        const existingIndex = state.bookings.findIndex(b => b.userId === currentUserId && b.date === selectedDateStr);
        
        if (existingIndex > -1) {
            const bToRemove = state.bookings[existingIndex];
            state.bookings.splice(existingIndex, 1);
            showNotification("Annullamento registrato.", "success");
            await syncBookingWithGoogle(bToRemove, "remove");
            render();
            return;
        }
        
        const monStr = selectedDateStr.substring(0, 7);
        const userMonthBookings = state.bookings.filter(b => b.userId === currentUserId && b.date.startsWith(monStr));
        
        if (userMonthBookings.length >= MAX_DAYS_PER_MONTH) { 
            showNotification(`Hai già raggiunto il limite di ${MAX_DAYS_PER_MONTH} giorni questo mese.`, "error"); return; 
        }
        
        if (dayOfWeek === 5) {
            let fridaysCount = userMonthBookings.filter(b => {
                const parts = b.date.split('-');
                const d = new Date(parts[0], parts[1]-1, parts[2], 12,0,0);
                return d.getDay() === 5;
            }).length;
            if (fridaysCount >= MAX_FRIDAYS_PER_MONTH) { 
                showNotification(`Hai già prenotato ${MAX_FRIDAYS_PER_MONTH} venerdì questo mese.`, "error"); return; 
            }
        }

        const floorBookings = state.bookings.filter(b => b.floor === currentUserFloor && b.date === selectedDateStr);
        const floorMax = FLOORS[currentUserFloor] ? FLOORS[currentUserFloor].maxSw : 1;
        
        if (floorBookings.length >= floorMax) { 
            showNotification(`Capacità per il piano esaurita in questa data.`, "error"); return; 
        }

        const newB = { 
            id: Date.now(), 
            userId: currentUserId, 
            name: state.currentUser.name, 
            date: selectedDateStr, 
            floor: currentUserFloor 
        };
        
        state.bookings.push(newB);
        showNotification("Prenotazione confermata!", "success");
        await syncBookingWithGoogle(newB, "add");
        render();
    }

    // ==========================================
    // MOTORE DI RENDERING HTML
    // ==========================================

    function render() {
        const app = document.getElementById('app');
        if (state.isLoading && USERS.length === 0) { 
            app.innerHTML = `
            <div class="flex-1 flex flex-col items-center justify-center p-4 bg-slate-900">
                <i data-lucide="loader-2" class="w-16 h-16 text-indigo-500 animate-spin mb-6"></i>
                <h1 class="text-white text-2xl font-black tracking-tight mb-2">Connessione al Server...</h1>
                <p class="text-slate-400 font-medium">Sincronizzazione database in corso</p>
            </div>`; 
        }
        else if (state.isBoardView) { app.innerHTML = renderBoardScreen(); attachBoardListeners(); }
        else if (!state.currentUser) { app.innerHTML = renderLoginScreen(); if (state.loginStep === 2) setTimeout(() => document.getElementById('password-input')?.focus(), 100); }
        else { app.innerHTML = renderDashboardScreen(); }
        lucide.createIcons();
    }

    function renderLoginScreen() {
        let userButtons = USERS.map(user => `
            <button onclick="selectLoginUser(${user.id})" class="w-full flex items-center justify-between p-4 border border-slate-100 rounded-2xl hover:border-indigo-200 hover:bg-indigo-50/50 transition-all group shadow-sm bg-white">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-black text-lg">${user.name.charAt(0)}</div>
                    <div class="text-left">
                        <p class="font-bold text-slate-800 text-lg">${user.name}</p>
                        <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider">${user.floor}</p>
                    </div>
                </div>
                <i data-lucide="chevron-right" class="w-6 h-6 text-slate-300 group-hover:text-indigo-500 transition-colors"></i>
            </button>`).join('');
        
        let content = '';
        if (state.loginStep === 1) {
            content = `
                <div class="mb-8 text-center">
                    <h2 class="text-2xl font-black text-slate-800 mb-2">Chi sta accedendo?</h2>
                    <p class="text-sm text-slate-500">Seleziona il tuo profilo dalla lista per continuare.</p>
                </div>
                <div class="space-y-3 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar mb-8 pb-4">
                    ${userButtons || '<p class="text-center text-slate-500 font-medium py-8">Nessun utente trovato nel database.</p>'}
                </div>
                <button onclick="enterBoardView()" class="w-full bg-white border-2 border-slate-200 hover:border-slate-800 hover:bg-slate-800 hover:text-white text-slate-700 font-bold py-4 rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-[0.98]">
                    <i data-lucide="calendar-days" class="w-5 h-5"></i> Vedi Calendario Generale
                </button>`;
        } else {
            content = `
                <button onclick="cancelLogin()" class="text-sm text-slate-500 font-bold mb-8 flex items-center gap-2 hover:text-indigo-600 transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Torna alla lista
                </button>
                <div class="bg-indigo-50 rounded-2xl p-6 mb-8 flex items-center gap-5 border border-indigo-100">
                    <div class="w-16 h-16 rounded-full bg-indigo-600 flex items-center justify-center text-white font-black text-2xl shadow-lg shadow-indigo-200">
                        ${state.loginUser.name.charAt(0)}
                    </div>
                    <div>
                        <p class="text-xs font-black text-indigo-400 uppercase tracking-widest mb-1">Utente Selezionato</p>
                        <p class="font-black text-slate-800 text-xl">${state.loginUser.name}</p>
                    </div>
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-3">Inserisci la tua Password</label>
                        <input type="password" id="password-input" onkeypress="if(event.key==='Enter')submitLogin()" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-slate-200 focus:border-indigo-500 focus:bg-white focus:outline-none transition-all text-lg tracking-widest text-center" placeholder="••••••••">
                    </div>
                    <button onclick="submitLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-indigo-200 transition-all active:scale-[0.98]">
                        Accedi alla Dashboard
                    </button>
                </div>`;
        }
        return `
            <div class="flex-1 flex flex-col items-center justify-center p-4 sm:p-8 bg-slate-900">
                <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden scale-up">
                    <div class="p-8 sm:p-10">
                        <div class="flex items-center gap-4 mb-10 pb-6 border-b border-slate-100">
                            <div class="w-12 h-12 bg-indigo-100 rounded-xl flex items-center justify-center">
                                <i data-lucide="building-2" class="w-6 h-6 text-indigo-600"></i>
                            </div>
                            <div>
                                <h1 class="text-xl font-black text-slate-900 leading-tight">Smart Booking</h1>
                                <p class="text-sm text-slate-500 font-medium">Gestione Presenze Studio</p>
                            </div>
                        </div>
                        ${content}
                    </div>
                </div>
            </div>`;
    }

    function renderDashboardScreen() {
        const dateStr = toYYYYMMDD(state.selectedDate);
        const monStr = dateStr.substring(0, 7);
        const currentUserId = String(state.currentUser.id).trim();
        
        const userMonthBookings = state.bookings.filter(b => b.userId === currentUserId && b.date.startsWith(monStr));
        const hasBooked = state.bookings.some(b => b.userId === currentUserId && b.date === dateStr);
        
        const dayOfWeek = state.selectedDate.getDay();
        const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
        const chiusuraMotivo = getClosureReason(state.selectedDate);
        
        let btnContent = "";
        
        if (chiusuraMotivo) {
            btnContent = `<div class="text-center p-5 bg-red-100 rounded-2xl text-red-800 font-black border border-red-300 uppercase tracking-widest flex flex-col items-center justify-center gap-1 shadow-inner"><i data-lucide="calendar-x-2" class="w-6 h-6 mb-1 text-red-600"></i> CHIUSO<span class="text-xs opacity-80 normal-case">${chiusuraMotivo}</span></div>`;
        } else if (isWeekend) {
            btnContent = `<div class="text-center p-5 bg-red-50 rounded-2xl text-red-600 font-black border border-red-200 uppercase tracking-widest flex items-center justify-center gap-2"><i data-lucide="coffee" class="w-5 h-5"></i> WEEKEND - NON LAVORATIVO</div>`;
        } else {
            btnContent = `<button onclick="toggleBooking()" class="w-full py-5 px-4 rounded-2xl font-black text-white shadow-xl transition-all transform active:scale-95 flex items-center justify-center gap-3 ${hasBooked ? 'bg-red-500 hover:bg-red-600 shadow-red-200/50' : 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-200/50'}">
                <i data-lucide="${hasBooked ? 'x' : 'check'}" class="w-6 h-6"></i>
                ${hasBooked ? 'ANNULLA SMART WORKING' : 'PRENOTA SMART WORKING'}
            </button>`;
        }

        const fridayBookingsCount = userMonthBookings.filter(b => {
            const parts = b.date.split('-');
            const d = new Date(parts[0], parts[1]-1, parts[2], 12,0,0);
            return d.getDay() === 5;
        }).length;

        let floorStats = Object.keys(FLOORS).map(f => {
            const booked = state.bookings.filter(b => b.date === dateStr && b.floor === f).length;
            const max = FLOORS[f].maxSw;
            const total = FLOORS[f].total;
            
            const absPerc = total > 0 ? Math.round((booked / total) * 100) : 0;
            const maxPerc = total > 0 ? Math.round((max / total) * 100) : 0;
            const relPerc = max > 0 ? Math.min(Math.round((booked / max) * 100), 100) : 0;
            
            const colors = getCapacityColorLevels(relPerc);
            return `
                <div class="mb-4 last:mb-0">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-xs font-black uppercase tracking-wider text-slate-500">${f}</span>
                        <span class="text-sm font-black text-slate-800">${absPerc}% <span class="text-slate-400 font-medium">(${booked}/${total} - Limite: ${maxPerc}%)</span></span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                        <div class="h-full ${colors.bar} transition-all duration-1000 ease-out" style="width: ${relPerc}%"></div>
                    </div>
                </div>`;
        }).join('');

        return `
            <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
                <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-md">
                            <i data-lucide="building-2" class="w-5 h-5 text-white"></i>
                        </div>
                        <h1 class="font-black text-xl tracking-tight text-slate-800 hidden sm:block">Smart Booking</h1>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="enterBoardView()" class="hidden md:flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-indigo-600 transition-colors">
                            <i data-lucide="calendar" class="w-4 h-4"></i> Calendario
                        </button>
                        <div class="h-8 w-px bg-slate-200 hidden md:block mx-1"></div>
                        <div class="flex items-center gap-3 ml-2">
                            <div class="text-right hidden sm:block">
                                <p class="text-sm font-black text-slate-800 leading-tight">${state.currentUser.name}</p>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${state.currentUser.floor}</p>
                            </div>
                            <div class="w-10 h-10 rounded-xl bg-indigo-100 flex items-center justify-center font-black text-indigo-700">
                                ${state.currentUser.name.charAt(0)}
                            </div>
                        </div>
                        <button onclick="logout()" class="p-2 hover:bg-red-50 hover:text-red-600 rounded-xl transition-colors text-slate-400">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </header>

            <main class="flex-1 max-w-7xl mx-auto px-4 py-8 w-full grid grid-cols-1 xl:grid-cols-12 gap-8 scale-up">
                <div class="xl:col-span-4 space-y-6">
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="bg-slate-50 p-6 border-b border-slate-100 flex items-center gap-4">
                            <div class="w-12 h-12 bg-white rounded-2xl border border-slate-200 flex flex-col items-center justify-center shadow-sm">
                                <span class="text-[10px] font-black uppercase text-indigo-500 leading-none">${state.selectedDate.toLocaleDateString('it-IT', { month: 'short' })}</span>
                                <span class="text-lg font-black text-slate-800 leading-none mt-1">${state.selectedDate.getDate()}</span>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Stai gestendo il</p>
                                <h2 class="text-lg font-black capitalize text-slate-800">${state.selectedDate.toLocaleDateString('it-IT', { weekday: 'long' })}</h2>
                            </div>
                        </div>
                        <div class="p-6">${btnContent}</div>
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                        <h2 class="text-xs font-black text-slate-400 uppercase mb-6 tracking-widest flex items-center gap-2">
                            <i data-lucide="pie-chart" class="w-4 h-4 text-indigo-500"></i> I Tuoi Limiti Mensili
                        </h2>
                        <div class="space-y-5">
                            <div>
                                <div class="flex justify-between items-end mb-2">
                                    <span class="text-sm font-bold text-slate-600">Giorni totali in SW</span>
                                    <span class="text-sm font-black text-slate-800">${userMonthBookings.length} <span class="text-slate-400">/ ${MAX_DAYS_PER_MONTH}</span></span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-2.5">
                                    <div class="bg-indigo-600 h-2.5 rounded-full transition-all duration-700" style="width: ${(userMonthBookings.length / MAX_DAYS_PER_MONTH) * 100}%"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between items-end mb-2">
                                    <span class="text-sm font-bold text-slate-600">Venerdì in SW</span>
                                    <span class="text-sm font-black text-slate-800">${fridayBookingsCount} <span class="text-slate-400">/ ${MAX_FRIDAYS_PER_MONTH}</span></span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-2.5">
                                    <div class="bg-indigo-400 h-2.5 rounded-full transition-all duration-700" style="width: ${(fridayBookingsCount / MAX_FRIDAYS_PER_MONTH) * 100}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                        <h2 class="text-xs font-black text-slate-400 uppercase mb-6 tracking-widest flex items-center gap-2">
                            <i data-lucide="bar-chart-2" class="w-4 h-4 text-indigo-500"></i> Presenze in Studio il ${state.selectedDate.getDate()}
                        </h2>
                        ${floorStats}
                    </div>
                </div>

                <div class="xl:col-span-8 bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                    <div class="p-6 sm:p-8 border-b flex items-center justify-between bg-white">
                        <h2 class="text-2xl font-black capitalize text-slate-800 tracking-tight flex items-center gap-2">
                            ${state.currentMonthDate.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' })}
                        </h2>
                        <div class="flex gap-2">
                            <button onclick="changeMonth(-1)" class="p-2 sm:p-3 bg-slate-50 border border-slate-200 rounded-xl hover:bg-slate-100 hover:text-indigo-600 transition-all active:scale-90">
                                <i data-lucide="chevron-left" class="w-5 h-5"></i>
                            </button>
                            <button onclick="changeMonth(1)" class="p-2 sm:p-3 bg-slate-50 border border-slate-200 rounded-xl hover:bg-slate-100 hover:text-indigo-600 transition-all active:scale-90">
                                <i data-lucide="chevron-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="p-6 sm:p-8 flex-1">
                        <div class="grid grid-cols-7 gap-2 sm:gap-4 mb-4 text-center font-black text-slate-400 text-[10px] sm:text-xs uppercase tracking-widest">
                            ${['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(d=>`<div>${d}</div>`).join('')}
                        </div>
                        <div class="grid grid-cols-7 gap-2 sm:gap-4">
                            ${generateCalendarCellsHTML()}
                        </div>
                    </div>
                </div>
            </main>
            
            <div class="md:hidden fixed bottom-0 left-0 w-full p-4 bg-white border-t border-slate-200 z-50">
                <button onclick="enterBoardView()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl flex justify-center items-center gap-2">
                    <i data-lucide="calendar" class="w-5 h-5"></i> Calendario Generale Studio
                </button>
            </div>
            <div class="h-20 md:hidden"></div>
        `;
    }

    function generateCalendarCellsHTML() {
        const year = state.currentMonthDate.getFullYear();
        const month = state.currentMonthDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let firstDay = new Date(year, month, 1).getDay(); 
        firstDay = firstDay === 0 ? 6 : firstDay - 1;
        
        let html = ''; 
        const selStr = toYYYYMMDD(state.selectedDate);
        const currentUserId = String(state.currentUser.id).trim();
        const currentUserFloor = String(state.currentUser.floor).trim();
        
        for (let i = 0; i < firstDay; i++) {
            html += `<div class="aspect-square rounded-2xl bg-slate-50/50 border border-dashed border-slate-200"></div>`;
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const dObj = new Date(year, month, day, 12, 0, 0); 
            const dStr = toYYYYMMDD(dObj);
            const isSel = selStr === dStr;
            const dayOfWeek = dObj.getDay();
            const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
            
            const floorB = state.bookings.filter(b => b.date === dStr && b.floor === currentUserFloor);
            const mSw = FLOORS[currentUserFloor] ? FLOORS[currentUserFloor].maxSw : 1;
            const totalF = FLOORS[currentUserFloor] ? FLOORS[currentUserFloor].total : 1;
            const myB = state.bookings.find(b => b.userId === currentUserId && b.date === dStr);
            const chiusuraMotivo = getClosureReason(dObj);
            
            let relPerc = mSw > 0 ? Math.round((floorB.length / mSw) * 100) : 0; 
            if (relPerc > 100) relPerc = 100;
            let absPerc = totalF > 0 ? Math.round((floorB.length / totalF) * 100) : 0;
            
            const colors = getCapacityColorLevels(relPerc);
            
            let cCl = `day-cell aspect-square p-2 sm:p-3 rounded-2xl border-2 flex flex-col relative transition-all cursor-pointer `;
            let bH = "";
            let numColor = "text-slate-700";

            if (isSel) {
                cCl += ` ring-4 ring-indigo-100 border-indigo-500 scale-[1.02] z-10 shadow-lg bg-white`;
            } else {
                cCl += ` border-slate-100 hover:border-indigo-300 hover:shadow-md bg-white`;
            }

            if (chiusuraMotivo) { 
                cCl = cCl.replace('bg-white', 'bg-red-100');
                if(!isSel) cCl = cCl.replace('border-slate-100', 'border-red-300');
                numColor = "text-red-800";
                bH = `<div class="hidden sm:block text-[9px] font-black bg-red-600 text-white rounded-md py-1 px-1 text-center uppercase truncate mt-auto shadow-sm">${chiusuraMotivo}</div>
                      <div class="sm:hidden mt-auto mx-auto w-2 h-2 rounded-full bg-red-600"></div>`; 
            }
            else if (isWeekend) {
                cCl = cCl.replace('bg-white', 'bg-red-50 opacity-80');
                if(!isSel) cCl = cCl.replace('border-slate-100', 'border-red-200 border-dashed');
                numColor = "text-red-500";
            } 
            else if (myB) { 
                cCl = cCl.replace('bg-white', 'bg-indigo-600');
                if(!isSel) cCl = cCl.replace('border-slate-100', 'border-indigo-700');
                numColor = "text-white";
                bH = `<div class="hidden sm:block text-[9px] font-black bg-white/20 text-white rounded-md py-1 px-1 text-center uppercase mt-auto">IL TUO SW</div>
                      <div class="sm:hidden mt-auto mx-auto w-2 h-2 rounded-full bg-white"></div>`; 
            }
            else if (floorB.length >= mSw) { 
                cCl = cCl.replace('bg-white', 'bg-red-50');
                if(!isSel) cCl = cCl.replace('border-slate-100', 'border-red-200');
                numColor = "text-red-700";
                bH = `<div class="hidden sm:flex text-[9px] font-black bg-red-500 text-white rounded-md py-1 px-1 justify-center items-center gap-1 uppercase mt-auto"><i data-lucide="lock" class="w-3 h-3"></i> PIENO</div>
                      <div class="sm:hidden mt-auto mx-auto w-2 h-2 rounded-full bg-red-500"></div>`; 
            }
            else { 
                bH = `<div class="hidden sm:block text-[9px] font-bold text-center ${colors.badgeText} ${colors.badgeBg} rounded-md py-1 mt-auto truncate">${absPerc}% OCCUPATO</div>
                      <div class="sm:hidden mt-auto mx-auto w-2 h-2 rounded-full ${colors.bar}"></div>`; 
            }

            html += `
                <div class="${cCl}" onclick="selectDate('${dStr}')">
                    <span class="font-black text-sm sm:text-base ${numColor}">${day}</span>
                    ${bH}
                </div>`;
        }
        return html;
    }

    function renderBoardScreen() {
        let modalHtml = "";
        if (state.showDayDetails) {
            const dayB = state.bookings.filter(b => b.date === state.showDayDetails);
            let groups = Object.keys(FLOORS).map(f => {
                const peopleInSW = dayB.filter(b => b.floor === f);
                if (peopleInSW.length === 0) return "";
                return `
                    <div class="mb-6">
                        <h4 class="text-xs font-black text-indigo-500 uppercase tracking-widest mb-3 border-b border-indigo-100 pb-2">${f}</h4>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                            ${peopleInSW.map(b => `
                                <div class="flex items-center gap-3 text-sm font-bold text-slate-700 p-3 bg-slate-50 border border-slate-200 rounded-xl">
                                    <div class="w-8 h-8 rounded-lg bg-indigo-100 text-indigo-700 flex items-center justify-center font-black">${b.name.charAt(0)}</div>
                                    ${b.name}
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }).join('');
            
            modalHtml = `
                <div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop scale-up" onclick="closeDayDetails()">
                    <div class="bg-white rounded-3xl shadow-2xl max-w-2xl w-full overflow-hidden border border-slate-200" onclick="event.stopPropagation()">
                        <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                            <div>
                                <p class="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-1">Dettaglio Presenze</p>
                                <h3 class="text-xl font-black capitalize">${formatDisplayDate(state.showDayDetails)}</h3>
                            </div>
                            <button onclick="closeDayDetails()" class="p-2 hover:bg-slate-800 rounded-full transition-colors">
                                <i data-lucide="x" class="w-6 h-6"></i>
                            </button>
                        </div>
                        <div class="p-6 sm:p-8 max-h-[70vh] overflow-y-auto custom-scrollbar">
                            ${groups || `
                                <div class="text-center py-16 flex flex-col items-center">
                                    <i data-lucide="users" class="w-12 h-12 text-slate-200 mb-4"></i>
                                    <p class="text-slate-500 font-bold text-lg">Nessuno in Smart Working.</p>
                                    <p class="text-slate-400 text-sm">Tutti sono fisicamente in studio oggi.</p>
                                </div>`}
                        </div>
                    </div>
                </div>`;
        }

        return `
            <header class="bg-slate-900 text-white shadow-md sticky top-0 z-40">
                <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700">
                            <i data-lucide="calendar-days" class="w-5 h-5 text-indigo-400"></i>
                        </div>
                        <h1 class="font-black text-lg sm:text-xl tracking-tight">Calendario Generale</h1>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="exitBoardView()" class="bg-slate-800 hover:bg-slate-700 text-sm font-bold py-2.5 px-5 rounded-xl border border-slate-700 transition-all flex items-center gap-2">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i> <span class="hidden sm:inline">Torna Indietro</span>
                        </button>
                    </div>
                </div>
            </header>
            
            <main class="flex-1 max-w-7xl mx-auto px-4 py-8 w-full scale-up">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                    <div class="p-6 sm:p-8 border-b flex items-center justify-between bg-slate-50">
                        <h2 class="text-2xl sm:text-3xl font-black text-slate-800 uppercase tracking-tight flex items-center gap-2">
                            ${state.currentMonthDate.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' })}
                        </h2>
                        <div class="flex gap-2">
                            <button onclick="changeMonth(-1)" class="p-3 bg-white border border-slate-200 rounded-xl hover:text-indigo-600 hover:border-indigo-200 shadow-sm transition-all active:scale-90">
                                <i data-lucide="chevron-left" class="w-5 h-5"></i>
                            </button>
                            <button onclick="changeMonth(1)" class="p-3 bg-white border border-slate-200 rounded-xl hover:text-indigo-600 hover:border-indigo-200 shadow-sm transition-all active:scale-90">
                                <i data-lucide="chevron-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-6 sm:p-8 overflow-x-auto">
                        <div class="min-w-[800px]">
                            <div class="grid grid-cols-7 gap-4 mb-6 text-center font-black text-slate-400 text-xs uppercase tracking-widest">
                                ${['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'].map(d=>`<div>${d}</div>`).join('')}
                            </div>
                            <div class="grid grid-cols-7 gap-4" id="board-calendar-grid">
                                ${generateBoardCalendarCellsHTML()}
                            </div>
                        </div>
                    </div>
                </div>
            </main>
            ${modalHtml}
        `;
    }

    function generateBoardCalendarCellsHTML() {
        const year = state.currentMonthDate.getFullYear();
        const month = state.currentMonthDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let firstDay = new Date(year, month, 1).getDay(); 
        firstDay = firstDay === 0 ? 6 : firstDay - 1;
        
        let html = '';
        let totalCap = 0; 
        Object.keys(FLOORS).forEach(f => totalCap += FLOORS[f].maxSw);
        const totalUsers = USERS.length; 
        
        for (let i = 0; i < firstDay; i++) {
            html += `<div class="h-36 rounded-2xl bg-slate-50/50 border border-dashed border-slate-200"></div>`;
        }
        
        for (let day = 1; day <= daysInMonth; day++) {
            const dObj = new Date(year, month, day, 12, 0, 0);
            const dateStr = toYYYYMMDD(dObj);
            const dayOfWeek = dObj.getDay();
            const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
            
            const dayB = state.bookings.filter(b => b.date === dateStr);
            
            const capPerc = totalCap > 0 ? Math.round((dayB.length / totalCap) * 100) : 0;
            const popPerc = totalUsers > 0 ? Math.round((dayB.length / totalUsers) * 100) : 0;
            
            const colors = getCapacityColorLevels(capPerc); 
            const chiusuraMotivo = getClosureReason(dObj);
            
            let cellCl = `board-day-cell h-36 p-3 rounded-2xl border-2 flex flex-col relative transition-all `;
            let inner = '';

            if (chiusuraMotivo) { 
                cellCl += " bg-red-100 border-red-300 pointer-events-none"; 
                inner = `<div class="mt-auto text-[10px] font-black bg-red-600 text-white rounded-lg py-2 px-1 text-center uppercase leading-tight shadow-sm">${chiusuraMotivo}</div>`; 
            }
            else if (isWeekend) {
                cellCl += " bg-red-50 border-red-100 opacity-70 pointer-events-none";
                inner = `<div class="mt-auto text-[10px] font-black text-red-400 text-center uppercase mb-2">Weekend</div>`;
            } 
            else { 
                cellCl += ` bg-white border-slate-100 hover:border-indigo-300 hover:shadow-xl hover:scale-[1.02] cursor-pointer z-10`; 
                inner = `
                    <div class="mt-2 space-y-1 overflow-hidden flex-1">
                        ${dayB.slice(0, 3).map(b => `<div class="text-[10px] font-bold bg-slate-50 text-slate-700 px-2 py-1 rounded-md truncate border border-slate-100 shadow-sm">${b.name}</div>`).join('')}
                        ${dayB.length > 3 ? `<div class="text-[10px] font-bold text-slate-400 px-2">+ altri ${dayB.length - 3}</div>` : ''}
                    </div>
                    <div class="flex items-center justify-between mt-2 pt-2 border-t border-slate-100">
                        <div class="flex -space-x-1">
                            ${dayB.length > 0 ? `<div class="w-2 h-2 rounded-full bg-indigo-500"></div>` : ''}
                        </div>
                        <div class="text-[10px] ${colors.badgeText} font-black uppercase tracking-tight" title="Saturazione dei limiti SW al ${capPerc}%">${dayB.length}/${totalUsers} SW (${popPerc}%)</div>
                    </div>`;
            }
            
            html += `
                <div class="${cellCl}" data-date="${dateStr}">
                    <span class="font-black text-sm ${chiusuraMotivo ? 'text-red-800' : isWeekend ? 'text-red-500' : colors.badgeText}">${day}</span>
                    ${inner}
                </div>`;
        }
        return html;
    }

    function attachBoardListeners() { 
        document.querySelectorAll('.board-day-cell').forEach(c => { 
            if(c.dataset.date) c.onclick = () => openDayDetails(c.dataset.date); 
        }); 
    }

    initApp();

</script>
